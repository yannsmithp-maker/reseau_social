<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonRéseau - Connectez-vous avec le monde</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="stylesheet" href="assets/css/feed.css">
    <link rel="stylesheet" href="assets/css/friends.css">
    <link rel="stylesheet" href="assets/css/profile.css">
    <link rel="stylesheet" href="assets/css/chat.css">
    <link rel="stylesheet" href="assets/css/admin.css">
    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- ============================================================
         APPLICATION PRINCIPALE (SPA - Single Page Application)
         Toutes les vues sont chargées dynamiquement ici
    ============================================================ -->
    <div id="app">

        <!-- Écran de chargement -->
        <div id="loading-screen">
            <div class="loader-container">
                <div class="loader"></div>
                <p>Chargement...</p>
            </div>
        </div>

        <!-- Conteneur principal (chargé après auth) -->
        <div id="main-container" style="display:none;">

            <!-- BARRE DE NAVIGATION -->
            <nav id="navbar">
                <div class="nav-left">
                    <a href="#" class="logo" onclick="navigateTo('feed')">
                        <i class="fa-solid fa-globe"></i>
                        <span>MonRéseau</span>
                    </a>
                    <div class="search-bar">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="search-input" placeholder="Rechercher...">
                    </div>
                </div>
                <div class="nav-center">
                    <button class="nav-btn active" onclick="navigateTo('feed')" title="Accueil">
                        <i class="fa-solid fa-house"></i>
                    </button>
                    <button class="nav-btn" onclick="navigateTo('friends')" title="Amis">
                        <i class="fa-solid fa-user-group"></i>
                    </button>
                    <button class="nav-btn" onclick="navigateTo('chat')" title="Messages">
                        <i class="fa-solid fa-comment-dots"></i>
                        <span class="badge" id="msg-badge" style="display:none;">0</span>
                    </button>
                    <button class="nav-btn" onclick="toggleNotifications()" title="Notifications">
                        <i class="fa-solid fa-bell"></i>
                        <span class="badge" id="notif-badge" style="display:none;">0</span>
                    </button>
                </div>
                <div class="nav-right">
                    <div class="user-menu" onclick="toggleUserMenu()">
                        <img src="assets/images/uploads/default.png" alt="Avatar" id="nav-avatar" class="nav-avatar">
                        <span id="nav-username">Utilisateur</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </div>
                    <!-- Dropdown menu utilisateur -->
                    <div class="dropdown-menu" id="user-dropdown" style="display:none;">
                        <a href="#" onclick="navigateTo('profile')"><i class="fa-solid fa-user"></i> Mon Profil</a>
                        <a href="#" onclick="navigateTo('settings')"><i class="fa-solid fa-gear"></i> Paramètres</a>
                        <hr>
                        <a href="#" onclick="logout()" class="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Déconnexion</a>
                    </div>
                </div>
            </nav>

            <!-- ZONE DE CONTENU PRINCIPAL -->
            <div id="page-content">
                <!-- Les vues sont injectées ici dynamiquement -->
            </div>

            <!-- PANNEAU NOTIFICATIONS -->
            <div id="notifications-panel" style="display:none;">
                <div class="notif-header">
                    <h3>Notifications</h3>
                    <button onclick="markAllRead()">Tout marquer comme lu</button>
                </div>
                <div id="notifications-list"></div>
            </div>

        </div>

        <!-- CONTENEUR AUTH (login / register / forgot password) -->
        <div id="auth-container" style="width:100vw; min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, #1877f2 0%, #0a4fa8 100%); position:fixed; top:0; left:0; z-index:999;"> 
            <!-- Chargé dynamiquement -->
        </div>

    </div>

    <!-- ============================================================
         SCRIPTS JAVASCRIPT
    ============================================================ -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/feed.js"></script>
    <script src="assets/js/friends.js"></script>
    <script src="assets/js/profile.js"></script>
    <script src="assets/js/chat.js"></script>
    <script src="assets/js/notifications.js"></script>
    <script src="assets/js/app.js"></script>

</body>
</html>
