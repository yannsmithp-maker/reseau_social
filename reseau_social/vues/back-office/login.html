<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration — MonRéseau</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/auth.css">
    <link rel="stylesheet" href="../../assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div id="auth-container">
    <div class="auth-box">
        <div class="auth-header">
            <div class="logo-icon"><i class="fa-solid fa-shield-halved"></i></div>
            <h1>Administration</h1>
            <p>Accès réservé aux administrateurs et modérateurs</p>
        </div>
        <div class="auth-body">
            <div id="auth-alert"></div>
            <div class="form-group input-icon">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="admin-email" class="form-control" placeholder="Adresse email">
            </div>
            <div class="form-group input-icon">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="admin-mdp" class="form-control" placeholder="Mot de passe"
                       onkeypress="if(event.key==='Enter') handleAdminLogin()">
                <button class="toggle-password" onclick="toggleAdminPassword()">
                    <i class="fa-solid fa-eye" id="eye-icon"></i>
                </button>
            </div>
            <button id="btn-admin-login" class="btn btn-primary btn-full" onclick="handleAdminLogin()">
                <i class="fa-solid fa-right-to-bracket"></i> Se connecter
            </button>
        </div>
        <div class="auth-footer">
            <a href="../../index.html">
                <i class="fa-solid fa-arrow-left"></i> Retour au site
            </a>
        </div>
    </div>
</div>

<script src="../../assets/js/config.js"></script>
<script src="../../assets/js/utils.js"></script>
<script>
    // Redirige vers le dashboard si déjà connecté en admin
    if (Session.isLoggedIn()) {
        const user = Session.getUser();
        if (user && ['administrateur', 'moderateur'].includes(user.role)) {
            window.location.href = 'dashboard.html';
        }
    }

    async function handleAdminLogin() {
        const email = document.getElementById('admin-email').value.trim();
        const mdp   = document.getElementById('admin-mdp').value;
        const alert = document.getElementById('auth-alert');

        if (!email || !mdp) {
            alert.innerHTML = `<div class="auth-alert error"><i class="fa-solid fa-circle-xmark"></i> Tous les champs sont obligatoires.</div>`;
            return;
        }

        const btn = document.getElementById('btn-admin-login');
        btn.disabled   = true;
        btn.innerHTML  = '<i class="fa-solid fa-spinner fa-spin"></i> Connexion...';

        const res = await apiRequest('/auth/login.php', 'POST', { email, mot_de_passe: mdp });

        btn.disabled  = false;
        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Se connecter';

        if (!res.success) {
            alert.innerHTML = `<div class="auth-alert error"><i class="fa-solid fa-circle-xmark"></i> ${res.message}</div>`;
            return;
        }

        // Vérifie le rôle
        if (!['administrateur', 'moderateur'].includes(res.data.user.role)) {
            alert.innerHTML = `<div class="auth-alert error"><i class="fa-solid fa-circle-xmark"></i> Accès refusé. Droits insuffisants.</div>`;
            return;
        }

        Session.set(res.data.user, res.data.token);
        window.location.href = 'dashboard.html';
    }

    function toggleAdminPassword() {
        const input = document.getElementById('admin-mdp');
        const icon  = document.getElementById('eye-icon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>
</body>
</html>
